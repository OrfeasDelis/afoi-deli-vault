<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" font-family="'Helvetica Neue',Arial,sans-serif">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="75%">
      <stop offset="0%" stop-color="#14101f"/><stop offset="45%" stop-color="#0a0812"/><stop offset="100%" stop-color="#050409"/>
    </radialGradient>
    <radialGradient id="heartGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd0d8"/><stop offset="22%" stop-color="#ff5a78"/><stop offset="55%" stop-color="#ff2647"/><stop offset="100%" stop-color="#7c0a20"/>
    </radialGradient>
    <radialGradient id="heartHalo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(255,40,72,.55)"/><stop offset="40%" stop-color="rgba(255,40,72,.22)"/><stop offset="100%" stop-color="rgba(255,40,72,0)"/>
    </radialGradient>
    <radialGradient id="neb1" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="rgba(255,38,71,.30)"/><stop offset="100%" stop-color="rgba(255,38,71,0)"/></radialGradient>
    <radialGradient id="neb2" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="rgba(90,150,255,.26)"/><stop offset="100%" stop-color="rgba(90,150,255,0)"/></radialGradient>
    <radialGradient id="neb3" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="rgba(154,108,255,.24)"/><stop offset="100%" stop-color="rgba(154,108,255,0)"/></radialGradient>
    <radialGradient id="vign" cx="50%" cy="46%" r="62%"><stop offset="0%" stop-color="rgba(0,0,0,0)"/><stop offset="72%" stop-color="rgba(0,0,0,0)"/><stop offset="100%" stop-color="rgba(0,0,0,.72)"/></radialGradient>
    <filter id="soft" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="9"/></filter>
    <filter id="softbig" x="-120%" y="-120%" width="340%" height="340%"><feGaussianBlur stdDeviation="26"/></filter>
    <filter id="grain"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="7" stitchTiles="stitch"/><feColorMatrix type="saturate" values="0"/><feComponentTransfer><feFuncA type="linear" slope="0.06"/></feComponentTransfer></filter>
  </defs>

  <rect x="0" y="0" width="1600" height="900" fill="url(#bg)"/>

  <!-- nebula -->
  <ellipse cx="560" cy="320" rx="560" ry="430" fill="url(#neb1)"/>
  <ellipse cx="1180" cy="560" rx="560" ry="470" fill="url(#neb2)"/>
  <ellipse cx="840" cy="700" rx="640" ry="420" fill="url(#neb3)"/>

  <!-- starfield (baked) -->
  <g fill="#fdf7ff">
    <circle cx="60" cy="80" r="1.1" opacity=".55"/><circle cx="140" cy="200" r=".7" opacity=".35"/><circle cx="210" cy="60" r="1.4" opacity=".6"><animate attributeName="opacity" values=".6;.15;.6" dur="4s" repeatCount="indefinite"/></circle>
    <circle cx="320" cy="150" r=".6" opacity=".3"/><circle cx="90" cy="320" r="1.0" opacity=".5"/><circle cx="180" cy="430" r=".7" opacity=".4"/><circle cx="40" cy="520" r="1.3" opacity=".55"><animate attributeName="opacity" values=".55;.2;.55" dur="5.5s" repeatCount="indefinite"/></circle>
    <circle cx="260" cy="560" r=".6" opacity=".3"/><circle cx="120" cy="650" r="1.1" opacity=".5"/><circle cx="70" cy="760" r=".8" opacity=".4"/><circle cx="220" cy="820" r="1.2" opacity=".5"/><circle cx="350" cy="730" r=".6" opacity=".3"/>
    <circle cx="430" cy="110" r="1.0" opacity=".5"/><circle cx="540" cy="60" r=".7" opacity=".35"/><circle cx="610" cy="160" r="1.5" opacity=".6"><animate attributeName="opacity" values=".6;.18;.6" dur="6s" repeatCount="indefinite"/></circle>
    <circle cx="700" cy="90" r=".6" opacity=".3"/><circle cx="780" cy="150" r="1.0" opacity=".45"/><circle cx="880" cy="70" r=".8" opacity=".4"/><circle cx="960" cy="140" r="1.2" opacity=".5"/><circle cx="1050" cy="80" r=".7" opacity=".35"/>
    <circle cx="1140" cy="130" r="1.0" opacity=".5"/><circle cx="1240" cy="70" r=".6" opacity=".3"/><circle cx="1320" cy="170" r="1.3" opacity=".55"><animate attributeName="opacity" values=".55;.2;.55" dur="4.5s" repeatCount="indefinite"/></circle>
    <circle cx="1420" cy="240" r=".7" opacity=".4"/><circle cx="1500" cy="120" r="1.1" opacity=".5"/><circle cx="1540" cy="320" r=".8" opacity=".4"/><circle cx="1460" cy="430" r="1.2" opacity=".5"/><circle cx="1550" cy="520" r=".6" opacity=".3"/>
    <circle cx="1380" cy="540" r="1.0" opacity=".45"/><circle cx="1500" cy="640" r=".7" opacity=".35"/><circle cx="1430" cy="740" r="1.3" opacity=".55"><animate attributeName="opacity" values=".55;.2;.55" dur="5s" repeatCount="indefinite"/></circle>
    <circle cx="1540" cy="800" r=".6" opacity=".3"/><circle cx="1330" cy="830" r="1.0" opacity=".45"/><circle cx="1250" cy="760" r=".7" opacity=".35"/><circle cx="1180" cy="840" r="1.1" opacity=".5"/><circle cx="1060" cy="800" r=".6" opacity=".3"/>
    <circle cx="980" cy="850" r="1.2" opacity=".5"/><circle cx="900" cy="790" r=".7" opacity=".35"/><circle cx="700" cy="840" r="1.0" opacity=".45"/><circle cx="600" cy="800" r=".6" opacity=".3"/><circle cx="500" cy="850" r="1.1" opacity=".5"/>
    <circle cx="430" cy="790" r=".7" opacity=".35"/><circle cx="640" cy="700" r=".5" opacity=".25"/><circle cx="1020" cy="540" r=".6" opacity=".3"/><circle cx="350" cy="380" r=".6" opacity=".3"/><circle cx="1280" cy="380" r=".7" opacity=".35"/>
    <circle cx="160" cy="120" r=".5" opacity=".25"/><circle cx="760" cy="640" r=".5" opacity=".22"/><circle cx="1120" cy="630" r=".6" opacity=".3"/><circle cx="280" cy="260" r=".7" opacity=".35"/><circle cx="1380" cy="300" r=".5" opacity=".25"/>
  </g>
  <g fill="#9fd8ff">
    <circle cx="380" cy="240" r=".8" opacity=".45"/><circle cx="1070" cy="280" r="1.0" opacity=".5"/><circle cx="150" cy="560" r=".7" opacity=".4"/><circle cx="1450" cy="180" r=".9" opacity=".45"/><circle cx="820" cy="220" r=".6" opacity=".35"/><circle cx="560" cy="780" r=".8" opacity=".4"/>
  </g>
  <g fill="#ffc2cd">
    <circle cx="640" cy="320" r=".9" opacity=".45"/><circle cx="1180" cy="460" r=".7" opacity=".4"/><circle cx="980" cy="300" r=".8" opacity=".4"/><circle cx="470" cy="500" r=".6" opacity=".35"/><circle cx="1240" cy="600" r=".8" opacity=".4"/>
  </g>

  <!-- OS orbit rings -->
  <g fill="none">
    <circle cx="800" cy="430" r="138" stroke="#ff2647" stroke-width="1.4" opacity=".55"/>
    <circle cx="800" cy="430" r="212" stroke="#5ad6ff" stroke-width="1.1" opacity=".30" stroke-dasharray="5 12"><animate attributeName="stroke-dashoffset" from="0" to="200" dur="60s" repeatCount="indefinite"/></circle>
    <circle cx="800" cy="430" r="288" stroke="#5ad6ff" stroke-width="1.0" opacity=".22" stroke-dasharray="4 14"><animate attributeName="stroke-dashoffset" from="0" to="-200" dur="82s" repeatCount="indefinite"/></circle>
    <circle cx="800" cy="430" r="364" stroke="#6e6886" stroke-width="0.9" opacity=".16" stroke-dasharray="2 16"><animate attributeName="stroke-dashoffset" from="0" to="200" dur="104s" repeatCount="indefinite"/></circle>
    <circle cx="800" cy="430" r="442" stroke="#6e6886" stroke-width="0.9" opacity=".12" stroke-dasharray="2 20"><animate attributeName="stroke-dashoffset" from="0" to="-200" dur="126s" repeatCount="indefinite"/></circle>
  </g>

  <!-- order-lifecycle ribbon -->
  <path id="flowpath" d="M300,470 C560,640 980,620 1230,470 C1430,330 760,90 470,250 C250,380 1000,720 1140,690 C1100,760 360,720 300,470 Z" fill="none" stroke="rgba(90,214,255,.16)" stroke-width="1.4" stroke-dasharray="3 9"/>
  <g fill="#9fe9ff" font-size="9.5" letter-spacing="1.5" font-family="'Helvetica Neue',Arial,sans-serif">
    <circle cx="312" cy="498" r="3.4" opacity=".85"/><text x="312" y="487" text-anchor="middle" fill="#7fb9d6">① quote</text>
    <circle cx="1232" cy="475" r="3.4" opacity=".85"/><text x="1232" y="464" text-anchor="middle" fill="#7fb9d6">② order 0→1 · PO</text>
    <circle cx="474" cy="262" r="3.4" opacity=".85"/><text x="474" y="251" text-anchor="middle" fill="#7fb9d6">③ proforma · loading</text>
    <circle cx="1010" cy="700" r="3.4" opacity=".85"/><text x="1010" y="689" text-anchor="middle" fill="#7fb9d6">④ received 2 · delivered 3</text>
    <circle cx="1138" cy="692" r="3.4" opacity=".85"/><text x="1138" y="715" text-anchor="middle" fill="#7fb9d6">⑤ invoiced · paid 4</text>
  </g>

  <!-- comet -->
  <g>
    <circle r="3" fill="#5ad6ff" opacity=".5"><animateMotion dur="26s" repeatCount="indefinite" begin="-0.8s"><mpath href="#flowpath"/></animateMotion></circle>
    <circle r="4" fill="#c7f3ff" opacity=".7"><animateMotion dur="26s" repeatCount="indefinite" begin="-0.4s"><mpath href="#flowpath"/></animateMotion></circle>
    <circle r="5.4" fill="#ffffff"><animateMotion dur="26s" repeatCount="indefinite"><mpath href="#flowpath"/></animateMotion></circle>
  </g>

  <!-- ============ REGIONS ============ -->
  <!-- Supplier Highlands (live) -->
  <g>
    <circle cx="455" cy="235" r="114" fill="#ff2647" opacity=".10" filter="url(#softbig)"/>
    <circle cx="455" cy="235" r="37" fill="#ff2647" opacity=".14"/>
    <circle cx="455" cy="235" r="60" fill="#0c0a16" stroke="#ff2647" stroke-width="1.8"/>
    <text x="455" y="246" text-anchor="middle" font-size="48" fill="#ff2647" opacity=".92">⛰</text>
    <text x="455" y="317" text-anchor="middle" fill="#ece7f3" font-size="14" letter-spacing="2.5" style="text-transform:uppercase">Supplier Highlands</text>
    <text x="455" y="334" text-anchor="middle" fill="#8b859c" font-size="10" letter-spacing="1.5" font-family="Georgia,serif" font-style="italic">04 · the gravity center</text>
  </g>
  <!-- Order Harbor (live) -->
  <g>
    <circle cx="1235" cy="445" r="103" fill="#ff2647" opacity=".10" filter="url(#softbig)"/>
    <circle cx="1235" cy="445" r="33" fill="#ff2647" opacity=".14"/>
    <circle cx="1235" cy="445" r="54" fill="#0c0a16" stroke="#ff2647" stroke-width="1.8"/>
    <text x="1235" y="455" text-anchor="middle" font-size="43" fill="#ff2647" opacity=".92">⚓</text>
    <text x="1235" y="521" text-anchor="middle" fill="#ece7f3" font-size="14" letter-spacing="2.5" style="text-transform:uppercase">Order Harbor</text>
    <text x="1235" y="538" text-anchor="middle" fill="#8b859c" font-size="10" letter-spacing="1.5" font-family="Georgia,serif" font-style="italic">02 · the operational spine</text>
  </g>
  <!-- The Showroom (spec) -->
  <g>
    <circle cx="298" cy="458" r="87" fill="#5ad6ff" opacity=".10" filter="url(#softbig)"/>
    <circle cx="298" cy="458" r="29" fill="#5ad6ff" opacity=".14"/>
    <circle cx="298" cy="458" r="46" fill="#0c0a16" stroke="#5ad6ff" stroke-width="1.4" stroke-dasharray="7 6"/>
    <text x="298" y="467" text-anchor="middle" font-size="37" fill="#5ad6ff" opacity=".92">❖</text>
    <text x="298" y="526" text-anchor="middle" fill="#ece7f3" font-size="14" letter-spacing="2.5" style="text-transform:uppercase">The Showroom</text>
    <text x="298" y="543" text-anchor="middle" fill="#8b859c" font-size="10" letter-spacing="1.5" font-family="Georgia,serif" font-style="italic">05 · the conversion</text>
  </g>
  <!-- Finance Keep (spec) -->
  <g>
    <circle cx="1145" cy="690" r="87" fill="#5ad6ff" opacity=".10" filter="url(#softbig)"/>
    <circle cx="1145" cy="690" r="29" fill="#5ad6ff" opacity=".14"/>
    <circle cx="1145" cy="690" r="46" fill="#0c0a16" stroke="#5ad6ff" stroke-width="1.4" stroke-dasharray="7 6"/>
    <text x="1145" y="699" text-anchor="middle" font-size="37" fill="#5ad6ff" opacity=".92">◈</text>
    <text x="1145" y="758" text-anchor="middle" fill="#ece7f3" font-size="14" letter-spacing="2.5" style="text-transform:uppercase">Finance Keep</text>
    <text x="1145" y="775" text-anchor="middle" fill="#8b859c" font-size="10" letter-spacing="1.5" font-family="Georgia,serif" font-style="italic">10 · the risk, counted</text>
  </g>
  <!-- The Atelier Library (progress) -->
  <g>
    <circle cx="1180" cy="200" r="80" fill="#e6c074" opacity=".10" filter="url(#softbig)"/>
    <circle cx="1180" cy="200" r="26" fill="#e6c074" opacity=".14"/>
    <circle cx="1180" cy="200" r="42" fill="#0c0a16" stroke="#e6c074" stroke-width="1.8"/>
    <text x="1180" y="209" text-anchor="middle" font-size="34" fill="#e6c074" opacity=".92">◊</text>
    <text x="1180" y="264" text-anchor="middle" fill="#ece7f3" font-size="14" letter-spacing="2.5" style="text-transform:uppercase">The Atelier Library</text>
    <text x="1180" y="281" text-anchor="middle" fill="#8b859c" font-size="10" letter-spacing="1.5" font-family="Georgia,serif" font-style="italic">07 · materials intelligence</text>
  </g>
  <!-- Projects Field (concept) -->
  <g>
    <circle cx="455" cy="700" r="80" fill="#6e6886" opacity=".06" filter="url(#softbig)"/>
    <circle cx="455" cy="700" r="26" fill="#6e6886" opacity=".07"/>
    <circle cx="455" cy="700" r="42" fill="#0c0a16" stroke="#6e6886" stroke-width="1" stroke-dasharray="2 7" opacity=".85"/>
    <text x="455" y="709" text-anchor="middle" font-size="34" fill="#6e6886" opacity=".92">⬡</text>
    <text x="455" y="764" text-anchor="middle" fill="#ece7f3" font-size="14" letter-spacing="2.5" style="text-transform:uppercase">Projects Field</text>
    <text x="455" y="781" text-anchor="middle" fill="#8b859c" font-size="10" letter-spacing="1.5" font-family="Georgia,serif" font-style="italic">06 · where it lands</text>
  </g>
  <!-- Expansion Frontier (concept) -->
  <g>
    <circle cx="1418" cy="122" r="57" fill="#6e6886" opacity=".06" filter="url(#softbig)"/>
    <circle cx="1418" cy="122" r="19" fill="#6e6886" opacity=".07"/>
    <circle cx="1418" cy="122" r="30" fill="#0c0a16" stroke="#6e6886" stroke-width="1" stroke-dasharray="2 7" opacity=".85"/>
    <text x="1418" y="130" text-anchor="middle" font-size="24" fill="#6e6886" opacity=".92">✧</text>
    <text x="1418" y="172" text-anchor="middle" fill="#cdc6dc" font-size="12" letter-spacing="2" style="text-transform:uppercase">Expansion Frontier</text>
    <text x="1418" y="188" text-anchor="middle" fill="#8b859c" font-size="9.5" letter-spacing="1.5" font-family="Georgia,serif" font-style="italic">11 · the horizon</text>
  </g>
  <!-- Personal Vale (concept) + Journal moon -->
  <g>
    <circle cx="790" cy="818" r="91" fill="#6e6886" opacity=".06" filter="url(#softbig)"/>
    <circle cx="790" cy="818" r="30" fill="#6e6886" opacity=".07"/>
    <circle cx="790" cy="818" r="48" fill="#0c0a16" stroke="#6e6886" stroke-width="1" stroke-dasharray="2 7" opacity=".85"/>
    <text x="790" y="828" text-anchor="middle" font-size="38" fill="#6e6886" opacity=".92">☾</text>
    <text x="790" y="746" text-anchor="middle" fill="#ece7f3" font-size="14" letter-spacing="2.5" style="text-transform:uppercase">Personal Vale</text>
    <text x="790" y="729" text-anchor="middle" fill="#8b859c" font-size="10" letter-spacing="1.5" font-family="Georgia,serif" font-style="italic">12 · 15 · 16 · 17 — the other half</text>
    <circle cx="892" cy="848" r="11" fill="#0c0a16" stroke="#8b7fb0" stroke-width="1" opacity=".7"/>
    <text x="892" y="853" text-anchor="middle" font-size="10" fill="#8b7fb0">✎</text>
    <text x="918" y="852" fill="#6b6678" font-size="9.5" font-family="Georgia,serif" font-style="italic">Journal — by invitation</text>
  </g>

  <!-- ============ THE HEART ============ -->
  <circle cx="800" cy="430" r="220" fill="url(#heartHalo)"><animate attributeName="r" values="210;236;210" dur="4.6s" repeatCount="indefinite"/><animate attributeName="opacity" values=".8;1;.8" dur="4.6s" repeatCount="indefinite"/></circle>
  <circle cx="800" cy="430" r="64" fill="url(#heartGrad)" filter="url(#soft)" opacity=".9"/>
  <circle cx="800" cy="430" r="40" fill="url(#heartGrad)"><animate attributeName="r" values="38;44;38" dur="4.6s" repeatCount="indefinite"/></circle>
  <circle cx="800" cy="430" r="40" fill="none" stroke="#ffe2e8" stroke-width="1" opacity=".5"/>
  <text x="800" y="525" text-anchor="middle" fill="#ffd9e0" font-family="Georgia,serif" font-size="17" letter-spacing="6" style="text-transform:uppercase">The Heart</text>
  <text x="800" y="547" text-anchor="middle" fill="#9a8aa0" font-family="Georgia,serif" font-size="10.5" letter-spacing="3" font-style="italic">the source</text>

  <!-- ============ CHROME ============ -->
  <!-- title -->
  <text x="800" y="52" text-anchor="middle" fill="#f4eef8" font-family="Georgia,serif" font-size="34" font-weight="600" letter-spacing="15">ΑΦΟΙ&#160;&#160;ΔΕΛΗ</text>
  <text x="800" y="74" text-anchor="middle" fill="#8b859c" font-family="Georgia,serif" font-size="11" font-style="italic" letter-spacing="4" style="text-transform:uppercase">The Realm · one heart, and the worlds that orbit it</text>

  <!-- legend (top-left) -->
  <g font-family="'Helvetica Neue',Arial,sans-serif">
    <rect x="24" y="96" width="212" height="116" rx="12" fill="rgba(10,9,18,.72)" stroke="rgba(154,108,255,.18)"/>
    <text x="40" y="120" fill="#5b566b" font-size="10" letter-spacing="2.5" style="text-transform:uppercase">The light of each world</text>
    <circle cx="46" cy="138" r="5" fill="#ff2647"/><text x="60" y="142" fill="#ece7f3" font-size="12">Built · it runs</text>
    <circle cx="46" cy="160" r="5" fill="#e6c074"/><text x="60" y="164" fill="#ece7f3" font-size="12">In progress</text>
    <circle cx="46" cy="182" r="5" fill="#5ad6ff"/><text x="60" y="186" fill="#ece7f3" font-size="12">Specified · not yet lit</text>
    <circle cx="46" cy="204" r="5" fill="#6e6886"/><text x="60" y="208" fill="#ece7f3" font-size="12">Concept · still dark</text>
  </g>

  <!-- OS console (bottom-left) -->
  <g font-family="'Helvetica Neue',Arial,sans-serif">
    <rect x="24" y="688" width="356" height="188" rx="12" fill="rgba(10,9,18,.72)" stroke="rgba(154,108,255,.18)"/>
    <text x="40" y="712" fill="#5b566b" font-size="10" letter-spacing="2.5" style="text-transform:uppercase">The engine beneath — the 5-layer OS</text>
    <circle cx="46" cy="730" r="4.5" fill="#ff2647"/><text x="58" y="734" fill="#ece7f3" font-size="11.5" font-weight="600">1 · Knowledge</text><text x="178" y="734" fill="#8b859c" font-size="10">Obsidian — LIVE</text>
    <circle cx="46" cy="752" r="4.5" fill="#5ad6ff"/><text x="58" y="756" fill="#ece7f3" font-size="11.5" font-weight="600">2 · Data</text><text x="178" y="756" fill="#8b859c" font-size="10">Supabase — 11 schemas, 0 rows</text>
    <circle cx="46" cy="774" r="4.5" fill="#5ad6ff"/><text x="58" y="778" fill="#ece7f3" font-size="11.5" font-weight="600">3 · Automation</text><text x="178" y="778" fill="#8b859c" font-size="10">Python worker — no n8n</text>
    <circle cx="46" cy="796" r="4.5" fill="#6e6886"/><text x="58" y="800" fill="#ece7f3" font-size="11.5" font-weight="600">4 · Interface</text><text x="178" y="800" fill="#8b859c" font-size="10">Webapp — not begun</text>
    <circle cx="46" cy="818" r="4.5" fill="#6e6886"/><text x="58" y="822" fill="#ece7f3" font-size="11.5" font-weight="600">5 · AI Agent</text><text x="178" y="822" fill="#8b859c" font-size="10">concept</text>
    <line x1="40" y1="838" x2="364" y2="838" stroke="rgba(255,255,255,.07)"/>
    <text x="40" y="858" fill="#5b566b" font-size="10.5" font-style="italic" font-family="Georgia,serif">“Obsidian is the memory; the agent is never the source of truth.”</text>
  </g>

  <!-- quest (bottom-center) -->
  <g font-family="'Helvetica Neue',Arial,sans-serif">
    <rect x="540" y="838" width="520" height="40" rx="20" fill="rgba(28,8,16,.62)" stroke="rgba(255,38,71,.35)"/>
    <text x="566" y="863" fill="#ff2647" font-size="15">✦</text>
    <text x="586" y="857" fill="#8b859c" font-size="9" letter-spacing="2" style="text-transform:uppercase">Active quest</text>
    <text x="586" y="870" fill="#ffd9e0" font-size="12" font-weight="600">Trace one real order, 0 → 4 <tspan fill="#8b859c" font-weight="400">— the Skintzi tracer, the vault's first operational ground-truth</tspan></text>
  </g>

  <!-- overlays -->
  <rect x="0" y="0" width="1600" height="900" fill="url(#vign)"/>
  <rect x="0" y="0" width="1600" height="900" filter="url(#grain)" opacity=".5" style="mix-blend-mode:overlay"/>
</svg>
